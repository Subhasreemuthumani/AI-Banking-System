<!DOCTYPE html>
<html>
<head>
    <title>Register | Digital Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; height: 100vh; display: flex; align-items: center; }
        .reg-card { border: none; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); overflow: hidden; }
        .reg-header { background: #0d6efd; color: white; padding: 30px; text-align: center; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card reg-card">
                    <div class="reg-header">
                        <h4 class="fw-bold mb-0">Create Account</h4>
                        <small>Join our digital banking community</small>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-3">
                            <<div class="col-12"><input type="text" id="reg_name" class="form-control" placeholder="Full Name" autocomplete="off"></div>
<div class="col-12"><input type="email" id="reg_email" class="form-control" placeholder="Email Address" autocomplete="new-password"></div>
<div class="col-6"><input type="text" id="reg_acc" class="form-control" placeholder="Account No"></div>
<div class="col-6"><input type="text" id="reg_ifsc" class="form-control" placeholder="IFSC Code"></div>
<div class="col-12"><input type="text" id="reg_phone" class="form-control" placeholder="Phone Number"></div>
<div class="col-12"><input type="password" id="reg_pass" class="form-control" placeholder="Create Password" autocomplete="new-password"></div>
                            <div class="col-12">
                                <button onclick="registerUser()" class="btn btn-primary w-100 fw-bold p-3">Register Account</button>
                            </div>
                        </div>
                        <p class="text-center mt-3 mb-0">Already a member? <a href="/login" class="text-decoration-none">Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="static/script.js"></script>
</body>
</html>
