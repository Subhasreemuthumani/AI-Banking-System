<!DOCTYPE html>
<html>
<head>
    <title>Login | Digital Bank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; height: 100vh; display: flex; align-items: center; }
        .login-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .btn-otp { border-radius: 10px; padding: 10px; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card login-card p-4">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-primary">🏦 Digital BANK</h3>
                        <p class="text-muted">Secure OTP Login</p>
                    </div>
                    <div class="mb-3">
                        <input type="email" id="email" class="form-control p-3" placeholder="Enter Registered Email">
                    </div>
                    <button onclick="sendOTP()" class="btn btn-primary w-100 btn-otp mb-4 shadow-sm">Send Secure OTP</button>
                    
                    <div class="mb-3">
                        <input type="text" id="otp" class="form-control p-3 text-center" placeholder="Enter 6-Digit OTP" maxlength="6">
                    </div>
                    <button onclick="verifyOTP()" class="btn btn-success w-100 btn-otp shadow-sm">Verify & Login</button>
                    
                    <p class="text-center mt-4 mb-0 small">New user? <a href="/register" class="text-decoration-none">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="static/script.js"></script>
</body>
</html>
