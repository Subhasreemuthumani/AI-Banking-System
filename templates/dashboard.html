<!DOCTYPE html>
<html>
<head>
    <title>AI Bank - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { display: flex; background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { width: 240px; height: 100vh; background: #1e2a38; color: white; padding: 25px; position: fixed; }
        .sidebar a { display: block; color: #adb5bd; padding: 12px; text-decoration: none; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: #2c3e50; color: white; }
        .main { flex: 1; padding: 40px; margin-left: 240px; }
        .card { border: none; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.05); }
        .result-badge { font-size: 0.85rem; padding: 6px 15px; border-radius: 20px; font-weight: 600; }
        .analysis-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #6c757d; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h4 class="fw-bold mb-4">🏦 Digital BANK</h4>
    <hr class="mb-4">
    <a href="/dashboard" class="active">🏠 Dashboard</a>
    <a href="/my-complaints">📩 My Complaints</a>
    <a href="/logout" class="text-danger mt-5">🚪 Logout</a>
</div>

<div class="main">
    <h3 class="mb-4 fw-bold text-dark">Raise a New Complaint</h3>
    
    <div class="card p-4 mb-4">
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Customer Name</label>
                <input id="name" class="form-control bg-light border-0" value="{{ user.username }}" readonly>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Account Number</label>
                <input id="account" class="form-control bg-light border-0" value="{{ user.account_number }}" readonly>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Email (for Notifications)</label>
                <input id="email" type="email" class="form-control" placeholder="yourname@gmail.com" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-bold">Describe your issue in detail</label>
            <textarea id="complaint" class="form-control" rows="4" placeholder="Explain your problem clearly..."></textarea>
        </div>

        <div class="d-grid">
            <button id="submit_btn" onclick="predict()" class="btn btn-primary btn-lg fw-bold shadow-sm">
                🚀 Analyze & Submit Complaint
            </button>
        </div>
    </div>

    <div id="result_card" class="card p-4" style="display: none; border-left: 6px solid #0d6efd;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4 class="text-primary fw-bold mb-0">🔍 AI Analysis Report</h4>
            <div id="download_section">
                <a id="pdf_download_link" href="#" class="btn btn-outline-success btn-sm fw-bold">
                    📄 Download Receipt (PDF)
                </a>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-md-3">
                <p class="analysis-label">Category</p>
                <span id="category" class="badge bg-info text-dark result-badge"></span>
            </div>
            <div class="col-md-3">
                <p class="analysis-label">Severity</p>
                <span id="severity" class="badge result-badge"></span>
            </div>
            <div class="col-md-3">
                <p class="analysis-label">Root Cause</p>
                <p id="root_cause_display" class="fw-bold text-dark mb-0"></p>
            </div>
            <div class="col-md-3">
                <p class="analysis-label">Expected Resolution</p>
                <p id="res_time_display" class="fw-bold text-success mb-0"></p>
            </div>
        </div>

        <hr class="my-3">

        <div class="row mb-3">
            <div class="col-md-6">
                <p class="analysis-label">Department</p>
                <p id="dept" class="fw-bold mb-0 text-dark"></p>
            </div>
            <div class="col-md-6">
                <p class="analysis-label">Fraud/Spam Risk</p>
                <p id="fraud" class="fw-bold mb-0"></p>
            </div>
        </div>

        <div class="bg-light p-3 rounded mb-3">
            <p class="analysis-label">AI Automated Summary</p>
            <p id="summary" class="fst-italic text-secondary mb-0"></p>
        </div>

        <div class="text-end">
            <small class="text-muted">Ticket ID: <span id="ticket_id_display" class="fw-bold text-dark"></span></small>
        </div>
    </div>
</div>

<script>
function predict() {
    const text = document.getElementById("complaint").value;
    const email = document.getElementById("email").value;
    const name = document.getElementById("name").value;
    const account = document.getElementById("account").value;
    const btn = document.getElementById("submit_btn");

    if (!text || !email) {
        alert("Please fill all fields!");
        return;
    }

    // Loading State
    btn.disabled = true;
    btn.innerText = "Processing AI Analysis...";

    const params = new URLSearchParams();
    params.append('text', text);
    params.append('customer_name', name);
    params.append('account_number', account);
    params.append('email', email);

    fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: params
    })
    .then(res => res.json())
    .then(data => {
        btn.disabled = false;
        btn.innerText = "🚀 Analyze & Submit Complaint";
        alert("Complaint Submitted Successfully!");

        // Show result card
        document.getElementById("result_card").style.display = "block";
        
        // Fill data
        document.getElementById("category").innerText = data.category;
        document.getElementById("root_cause_display").innerText = data.root_cause;
        document.getElementById("res_time_display").innerText = data.expected_resolution;
        document.getElementById("dept").innerText = data.department;
        document.getElementById("fraud").innerText = data.fraud_risk + " / " + (data.spam_check || 'Safe');
        document.getElementById("summary").innerText = data.summary;
        document.getElementById("ticket_id_display").innerText = data.ticket_id;

        // Severity Color Logic
        let sev = document.getElementById("severity");
        sev.innerText = data.severity;
        if(data.severity === "High") {
            sev.className = "badge bg-danger result-badge";
        } else if(data.severity === "Medium") {
            sev.className = "badge bg-warning text-dark result-badge";
        } else {
            sev.className = "badge bg-success result-badge";
        }

        // PDF Link
        document.getElementById("pdf_download_link").href = "/download-ticket/" + data.ticket_id;
        
        // Auto-scroll to result
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    })
    .catch(err => {
        btn.disabled = false;
        btn.innerText = "🚀 Analyze & Submit Complaint";
        console.error(err);
        alert("Submission Failed. Check terminal.");
    });
}
</script>

</body>
</html>
