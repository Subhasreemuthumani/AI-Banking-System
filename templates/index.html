<!DOCTYPE html>
<html>
<head>
    <title>Digital Bank | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1e2a38 0%, #0d6efd 100%); height: 100vh; display: flex; align-items: center; color: white; }
        .hero-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); padding: 50px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); }
        .btn-custom { padding: 12px 30px; border-radius: 10px; font-weight: bold; transition: 0.3s; }
        .btn-login { background: white; color: #0d6efd; }
        .btn-reg { border: 2px solid white; color: white; }
        .btn-custom:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="container text-center">
        <div class="hero-card mx-auto" style="max-width: 700px;">
            <h1 class="display-4 fw-bold mb-3">🏦 Digital Banking System</h1>
            <p class="lead mb-5">Experience the future of banking with AI-powered complaint resolution and instant support.</p>
            <div class="d-flex justify-content-center gap-3">
                <a href="/login" class="btn btn-custom btn-login">Login to Portal</a>
                <a href="/register" class="btn btn-custom btn-reg">Create Account</a>
            </div>
        </div>
    </div>
</body>
</html>
